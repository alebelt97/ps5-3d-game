<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PS5 3D Game</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <canvas id="c"></canvas>
  <div id="title">PS5 3D</div>
  <div id="crosshair"></div>
  <div id="hud">WASD / left stick — move &nbsp;·&nbsp; right stick / arrow keys — look</div>
  <div id="err" style="display:none;position:fixed;top:60px;left:50%;transform:translateX(-50%);background:rgba(200,0,0,0.85);color:#fff;padding:10px 18px;border-radius:8px;font:700 13px sans-serif;max-width:80vw;text-align:center;"></div>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
  <script>
    window.onerror = function(msg, src, line) {
      var el = document.getElementById('err');
      el.textContent = 'JS error: ' + msg + ' (' + src.split('/').pop() + ':' + line + ')';
      el.style.display = 'block';
    };
  </script>
  <script src="game.js?v=4"></script>
</body>
</html>
